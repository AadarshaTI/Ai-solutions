{% extends "core/staff/base_staff.html" %}
{% block title %}Delete Query{% endblock %}

{% block staff_content %}
<div class="dashboard-topbar">
  <div><p class="section-label">Delete</p><h1>Delete Query</h1><p class="text-muted">This action cannot be undone.</p></div>
</div>
<section class="dashboard-panel">
  <p>Are you sure you want to delete the query from <strong>{{ query.name }}</strong>?</p>
  <form method="post" class="staff-form-actions">
    {% csrf_token %}
    <button type="submit" class="btn btn--danger">Delete</button>
    <a href="{% url 'staff_query_detail' query.pk %}" class="btn btn--outline">Cancel</a>
  </form>
</section>
{% endblock %}
