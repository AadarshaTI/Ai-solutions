{% extends "core/staff/base_staff.html" %}
{% block title %}Delete {{ singular }}{% endblock %}

{% block staff_content %}
<div class="dashboard-topbar">
  <div><p class="section-label">Delete</p><h1>Delete {{ singular }}</h1><p class="text-muted">This action cannot be undone.</p></div>
</div>
<section class="dashboard-panel">
  <p>Are you sure you want to delete <strong>{{ object }}</strong>?</p>
  <form method="post" class="staff-form-actions">
    {% csrf_token %}
    <button type="submit" class="btn btn--danger">Delete</button>
    <a href="{% url list_url %}" class="btn btn--outline">Cancel</a>
  </form>
</section>
{% endblock %}
